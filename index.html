        },

        },

        }
];

    let voteCount = parseInt(localStorage.getItem(VOTE_COUNT_KEY)) || 0;
    let votedIndices = JSON.parse(localStorage.getItem(VOTED_INDICES_KEY)) || [];

    function renderApp() {
        const app = document.getElementById('app');
        app.innerHTML = '';

        adList.forEach((ad, index) => {
            const card = document.createElement('div');
            card.className = 'ad-card';

            const hasVoted = votedIndices.includes(index);

            card.innerHTML = `
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/${ad.id}?rel=0" allowfullscreen></iframe>
                </div>
                <div class="info">
                    <h3>${String(index + 1).padStart(2, '0')}. ${ad.title}</h3>
                    <button class="vote-btn ${hasVoted ? 'voted' : ''}" id="btn-${index}"
                        onclick="submitVoteByIndex(${index})" ${hasVoted ? 'disabled' : ''}>
                        ${hasVoted ? '투표 완료' : '투표하기'}
                    </button>
                </div>
            `;

            app.appendChild(card);
        });

        updateVoteStatus();
    }

    function updateVoteStatus() {
        const statusEl = document.getElementById('current-status');
        if (statusEl) {
            statusEl.innerText = `${voteCount} / 5`;
        }
    }

    window.onload = function() {
        if (!localStorage.getItem(POPUP_KEY)) {
            alert("격월로 진행되는 베스트 크리에이티브 온라인 투표에 오신 여러분 환영합니다.\n\n" +
                  "후보작은 2026년 5~6월에 온에어된 광고 약 4,000여 개를 선별하여 30개의 광고가 선정되었습니다.\n\n" +
                  "온라인 투표를 통해 10개 이하 광고를 선정, 내부 심사를 거쳐 최종 1편의 베스트 크리에이티브가 결정됩니다.\n" +
                  "최종 선정작은 2026년 대한민국광고대상에서 예심 없이 본심에 오르며, 해당 팀의 인터뷰는 ADZ 7/8월호에서 확인하실 수 있습니다.\n\n" +
                  "※ 투표기간: 2026. 7. 9(목) 12시 ~ 7. 13(월) 18시까지");

            localStorage.setItem(POPUP_KEY, 'true');
        }

        renderApp();
    };

    function submitVoteByIndex(index) {
        const ad = adList[index];

        if (!ad) {
            alert("광고 정보를 찾을 수 없습니다. 페이지를 새로고침한 뒤 다시 시도해 주세요.");
            return;
        }

        submitVote(ad.title, index);
    }

    function submitVote(title, index) {
        if (voteCount >= 5) {
            alert("이미 5번의 투표를 모두 완료하셨습니다. 참여해주셔서 감사합니다!");
            return;
        }

        if (votedIndices.includes(index)) {
            alert("이미 투표한 광고입니다.");
            return;
        }

        const remaining = 5 - voteCount;

        if (!confirm(`'${title}'에 투표하시겠습니까?\n\n(현재 투표 완료: ${voteCount}회 / 남은 투표권: ${remaining}회)`)) {
            return;
        }

        const btn = document.getElementById(`btn-${index}`);
        btn.innerText = "전송 중...";
        btn.disabled = true;

        const finalURL = scriptURL
            + "?adTitle=" + encodeURIComponent(title)
            + "&timestamp=" + encodeURIComponent(new Date().toLocaleString('ko-KR'));

        fetch(finalURL, {
            mode: 'no-cors',
            cache: 'no-cache'
        })
        .then(() => {
            voteCount++;
            votedIndices.push(index);

            localStorage.setItem(VOTE_COUNT_KEY, voteCount);
            localStorage.setItem(VOTED_INDICES_KEY, JSON.stringify(votedIndices));

            btn.innerText = "투표 완료";
            btn.classList.add("voted");
            btn.disabled = true;

            updateVoteStatus();

            alert(`투표가 반영되었습니다! (총 ${voteCount}/5회 완료)`);
        })
        .catch(() => {
            alert("네트워크 연결이 불안정합니다. 일반 브라우저(Chrome/Safari) 이용을 권장합니다.");
            btn.innerText = "투표하기";
            btn.disabled = false;
        });
    }
</script>
