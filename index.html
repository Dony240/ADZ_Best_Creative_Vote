<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADZ 베스트 크리에이티브 투표</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; background: #f0f2f5; color: #333; }
        .header { text-align: center; padding: 30px 0; }
        #app { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .ad-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .info { padding: 15px 20px; text-align: left; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .info h3 { margin: 0 0 15px 0; font-size: 1rem; font-weight: 600; line-height: 1.4; color: #222; }
        .vote-btn { background: #007bff; color: white; border: none; padding: 14px 0; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .vote-btn:hover { background: #0056b3; }
        .vote-btn:disabled { background: #ccc; cursor: not-allowed; }
        .vote-btn.voted { background: #28a745; cursor: default; }
    </style>
</head>
<body>

    <div class="header">
        <h2>ADZ 베스트 크리에이티브 투표</h2>
        <div style="max-width: 800px; margin: 20px auto; text-align: left; background: #fff; padding: 25px; border-radius: 12px; border: 1px solid #e1e4e8; line-height: 1.6; font-size: 0.95rem;">
            <p style="margin-top: 0;">후보작 중 베스트 크리에이티브를 선택해 주세요. <b>(최대 5개까지 선택 가능)</b></p>
            <div style="background: #eef7ff; padding: 15px; border-radius: 8px; border-left: 5px solid #007bff; margin: 15px 0;">
                <b style="color: #0056b3;">🗳️ 투표 현황: </b> <span id="current-status" style="font-weight: bold; color: #d63384;">0 / 5</span> 투표 완료
            </div>
            <p style="text-align: center; background: #f8f9fa; padding: 10px; border-radius: 5px; font-weight: bold; color: #d63384; margin-bottom: 0;">
                ※ 투표기간: 2026. 5. 6(수) 12시 ~ 5. 10(일) 18시
            </p>
        </div>
    </div>

    <div id="app"></div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxDchjYrdyKggqADRJBtrdpfLKurrHOdzHq0B8ZTmo1L5PwEAuoCTgYfF_U_fY8Q-N7rg/exec';

   const adList = [
    { id: "qJ7qlWSN3_I", title: "[소이조이] 내 입에 내 몸에 당당한 간식, 소이조이!" },
    { id: "mB3g6I0mM6I", title: "[HD현대] 진짜 큰 사람 모집 중 (키 제한 없음) | 2026년 상반기 HD현대 신입사원 채용" },
    { id: "ohqqj9jZGwQ", title: "[짐빔 하이볼] 함께 즐길 짐빔 됐어?" },
    { id: "eHs7jHtNUqY", title: "[블랙야크] THIS IS HIMALAYAN" },
    { id: "PuTJwCnM1nw", title: "[The Kia EV] For Every Life | EV 멀티버스 EV5" },
    { id: "tu0snb0PwGI", title: "[갤럭시 버즈4 프로] 이어폰 바꿀까 | 통화 편" },
    { id: "PHjntPl2OHU", title: "[T멤버십] [상위 1%의 소개팅] 이런 연프 본 적 있어?" },
    { id: "wN89PcdHvV4", title: "[콜대원] 감기의 소리를 찾아서 런칭편" },
    { id: "JotbQgnkrM0", title: "[신세계그룹] 랜더스 쇼핑페스타 압도적 득템 쇼! 런칭편" },
    { id: "Ei5vddkE_l4", title: "[토스증권] 이것은 분명 인류의 호재 | 토스증권 AI편" },
    { id: "rtSdnHXjcH4", title: "[대산로얄진염소] 대산 광고" },
    { id: "44IOd1Tc6JQ", title: "[본죽&비빔밥] 냉이된불🎶: 부를수록 기운이 나고 입맛이 살아나는 봄의 소리" },
    { id: "HWjXl3KWwng", title: "[호올스] 숨이 턱턱 막힐 땐 이것만 기억해" },
    { id: "PtZKD2SMmLY", title: "[컴투스프로야구] 올해 야구의 주인공은 너야! | 2026 KBO 개막편" },
    { id: "QyKNDadCmbI", title: "[나비엔 제습 환기청정기 매직플러스] 같은 구조인데, 이 집 공기는 왜 다르지?" },
    { id: "QQVHCzs-pJM", title: "[게토레이 런] 짜릿한 완주의 맛, 게토레이 런" },
    { id: "Sm8YL0OCPwg", title: "[컴포즈커피] 그날 밤, 우리의 디카페인" },
    { id: "vhw1R8nSt9g", title: "[비비드키친] 1등 저당 소스 편" },
    { id: "LDuZcS22jnQ", title: "[칠성사이다] 답답한 순간, 터지는 사이다! K-Soul Drink 칠성사이다 (feat. 롯데 자이언츠 레이예스)" },
    { id: "nHlnIoswdcg", title: "[구글 제미나이] 김연아의 발레 도전 | 죽음의 무도" },
    { id: "-YDHnITHfxo", title: "[투썸플레이스] 오월의 마음엔 망고생" },
    { id: "uV_8ClzqLQ0", title: "[LG유플러스] 딸의 낯선 목소리" },
    { id: "ZTPzK4zdvOM", title: "[처음처럼] 그때처럼 처음처럼 부드러울 따름~ 감성남 편" },
    { id: "tMOM9tAit88", title: "[엔카] 나의 잔존가치 편" },
    { id: "8Mpf3YvpzRw", title: "[삼쩜삼] 당신의 숨은돈, 끝까지 찾는다" },
    { id: "ofbwqKYRD_w", title: "[테라] 테라 FOOH 테라타워" },
    { id: "tuZdwwZDxj0", title: "[시몬스] LIFE IS COMFORT | Ep. SET" },
    { id: "5j0lvHHFzhI", title: "[소니 α7 V] 가장 쉬운 완벽, Alpha 7 V" },
    { id: "TMRRokbsZCo", title: "[현대면세점] 현대면세점. WE ARE HERE." },
    { id: "hExY1KNg_fQ", title: "[카스 레몬스퀴즈] 레몬맨의 상큼한 귀환!" }
];

    let voteCount = parseInt(localStorage.getItem('myVoteCount')) || 0;
    let votedIndices = JSON.parse(localStorage.getItem('votedIndices')) || [];

    function renderApp() {
        const app = document.getElementById('app');
        app.innerHTML = ''; 

        adList.forEach((ad, index) => {
            const card = document.createElement('div');
            card.className = 'ad-card';
            const hasVoted = votedIndices.includes(index);
            card.innerHTML = `
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/${ad.id}?rel=0" allowfullscreen></iframe>
                </div>
                <div class="info">
                    <h3>${String(index + 1).padStart(2, '0')}. ${ad.title}</h3>
                    <button class="vote-btn ${hasVoted ? 'voted' : ''}" id="btn-${index}" 
                        onclick="submitVote('${ad.title}', ${index})" ${hasVoted ? 'disabled' : ''}>
                        ${hasVoted ? '투표 완료' : '투표하기'}
                    </button>
                </div>
            `;
            app.appendChild(card);
        });
        updateVoteStatus();
    }

    function updateVoteStatus() {
        const statusEl = document.getElementById('current-status');
        if(statusEl) statusEl.innerText = `${voteCount} / 5`;
    }

    // [수정] 페이지 로드 시 이미지 내용을 담은 첫 번째 팝업 노출
    window.onload = function() {
        alert("격월로 진행되는 베스트 크리에이티브 온라인 투표에 오신 여러분 환영합니다.\n\n" +
              "후보작은 2026년 3~4월에 온에어된 광고 약 4,000여 개를 선별하여 30개의 광고가 선정되었습니다.\n\n" +
              "온라인 투표를 통해 10개 이하 광고를 선정, 내부 심사를 거쳐 최종 1편의 베스트 크리에이티브가 결정됩니다.\n" +
              "최종 선정작은 2026년 대한민국광고대상에서 예심 없이 본심에 오르며, 해당 팀의 인터뷰는 ADZ 5/6월호에서 확인하실 수 있습니다.\n\n" +
              "※ 투표기간: 2026. 5. 6(수) 12시 ~ 5. 10(일) 18시까지");
        renderApp();
    };

    function submitVote(title, index) {
        if (voteCount >= 5) {
            alert("이미 5번의 투표를 모두 완료하셨습니다. 참여해주셔서 감사합니다!");
            return;
        }

        if (votedIndices.includes(index)) {
            alert("이미 투표한 광고입니다.");
            return;
        }

        // 실시간 잔여 횟수 확인 알림
        const remaining = 5 - voteCount;
        if (!confirm(`'${title}'에 투표하시겠습니까?\n\n(현재 투표 완료: ${voteCount}회 / 남은 투표권: ${remaining}회)`)) return;

        const btn = document.getElementById(`btn-${index}`);
        btn.innerText = "전송 중...";
        btn.disabled = true;

        const finalURL = scriptURL + "?adTitle=" + encodeURIComponent(title) + "&timestamp=" + encodeURIComponent(new Date().toLocaleString());

        fetch(finalURL, { 
            mode: 'no-cors',
            cache: 'no-cache'
        })
        .then(() => {
            voteCount++;
            votedIndices.push(index);
            localStorage.setItem('myVoteCount', voteCount);
            localStorage.setItem('votedIndices', JSON.stringify(votedIndices));
            
            alert(`투표가 반영되었습니다! (총 ${voteCount}/5회 완료)`);
            location.reload(); 
        })
        .catch(err => {
            alert("네트워크 연결이 불안정합니다. 일반 브라우저(Chrome/Safari) 이용을 권장합니다.");
            btn.innerText = "투표하기";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
